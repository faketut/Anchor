# One-command Splunk Enterprise sandbox for the Anchor demo.
# Bring up:   docker compose up -d
# Tear down:  docker compose down -v
# Login:      http://localhost:8000  (admin / Anchor!Demo2026)

services:
  splunk:
    image: splunk/splunk:latest
    container_name: anchor-splunk
    environment:
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_PASSWORD: "Anchor!Demo2026"
    ports:
      - "8000:8000"   # Splunk Web UI
      - "8089:8089"   # Management API (Anchor talks to this)
      - "8088:8088"   # HEC (optional, for live ingest)
    volumes:
      - splunk-var:/opt/splunk/var
      - splunk-etc:/opt/splunk/etc
      # collections.conf is NOT bind-mounted — single-file bind mounts break
      # splunk-ansible's chown step on Docker Desktop (Windows/macOS).
      # Install it after the container is healthy:
      #   docker cp splunk/collections.conf anchor-splunk:/opt/splunk/etc/apps/search/local/collections.conf
      #   docker exec -u root   anchor-splunk chown splunk:splunk /opt/splunk/etc/apps/search/local/collections.conf
      #   docker exec -u splunk anchor-splunk /opt/splunk/bin/splunk restart
      # All other `splunk` CLI calls must also use `-u splunk` (root cannot
      # write to splunk-owned paths; this matters on Docker Desktop).
      # Mount seed-data dir so `splunk add oneshot` can reach it from inside the container
      - ./examples/data:/seed:ro
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8089/services/server/info"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  splunk-var:
  splunk-etc:
